# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: rest-mcp

before:
  hooks:
    - go mod tidy

builds:
  - id: rest-mcp
    main: ./cmd/rest-mcp
    binary: rest-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - rest-mcp.example.toml

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: devstroop
    name: rest-mcp
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - name: rest-mcp
    repository:
      owner: devstroop
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/devstroop/rest-mcp"
    description: "Turn any REST API into MCP tools — via OpenAPI spec or manual config"
    license: "MIT"
    install: |
      bin.install "rest-mcp"
    test: |
      system "#{bin}/rest-mcp", "--version"

nfpms:
  - id: default
    package_name: rest-mcp
    vendor: devstroop
    homepage: https://github.com/devstroop/rest-mcp
    description: "Turn any REST API into MCP tools — via OpenAPI spec or manual config"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
